apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bulwark-webmail.fullname" . }}
  labels:
    {{- include "bulwark-webmail.labels" . | nindent 4 }}
data:
  JMAP_SERVER_URL: {{ .Values.config.jmapServerUrl | quote }}
  APP_NAME: {{ .Values.config.appName | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  TZ: {{ .Values.config.TZ | quote }}
  {{- if .Values.config.oauthIssuerUrl }}
  OAUTH_ENABLED: "true"
  OAUTH_ISSUER_URL: {{ .Values.config.oauthIssuerUrl | quote }}
  {{- end }}
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
