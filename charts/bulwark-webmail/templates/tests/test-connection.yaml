apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "bulwark-webmail.fullname" . }}-test-connection"
  labels:
    {{- include "bulwark-webmail.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
      command:
        - wget
        - --spider
        - --timeout=5
        - "http://{{ include "bulwark-webmail.fullname" . }}:{{ .Values.service.port }}/api/health"
