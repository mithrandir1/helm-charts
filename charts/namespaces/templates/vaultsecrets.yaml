{{- range $key, $value := .Values.namespaces }}
{{ if eq ( .enabled | toString) "true" }}
{{ if and .vaultSecrets .vaultSecrets.secrets }}
{{- $operator := default "vso" .vaultSecrets.operator }}
{{- range .vaultSecrets.secrets }}
{{- $name := .name | required "name is required for vaultSecret." }}
---
{{- if eq $operator "eso" }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .name | replace "_" "-" | quote }}
  namespace: {{ $value.name | replace "_" "-" | quote }}
spec:
  refreshInterval: {{ default "1h" .refreshAfter | quote }}
  secretStoreRef:
    name: {{ required "auth is required for ExternalSecret." .auth | replace "_" "-" | quote }}
    kind: SecretStore
  target:
    name: {{ .name | replace "_" "-" | quote }}
    creationPolicy: Owner
    {{- if .secretType }}
    template:
      type: {{ .secretType | quote }}
    {{- end }}
  dataFrom:
    - extract:
        key: {{ printf "%s/%s" (required "mount is required for ExternalSecret." .mount) (required "path is required for ExternalSecret." .path) | quote }}
{{- else }}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vaultsecret-{{ .name | replace "_" "-" | lower }}
  namespace: {{ $value.name | replace "_" "-" | quote }}
spec:
  type: {{ default "kv-v2" .type }}
  mount: {{ required "mount is required for VaultStaticSecret." .mount | quote }}
  path: {{ required "path is required for VaultStaticSecret." .path | quote }}
  refreshAfter: {{ default "3600s" .refreshAfter | quote }}
  vaultAuthRef: {{ required "auth is required for VaultStaticSecret." .auth | quote }}
  {{- if .namespace }}
  namespace: {{ .namespace | quote }}
  {{- end }}
  destination:
    name: {{ .name | replace "_" "-" | quote }}
    create: true
    type: {{ default "Opaque" .secretType }}
    {{- if .transformation }}
    transformation: {{ .transformation | toYaml | nindent 6 }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
